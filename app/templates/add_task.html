{% extends "base.html" %}
{% block content %}

<div class="container-fluid py-5" style="min-height:100vh; background:#f8f9fa;">

    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">

            <div class="bg-white p-5 shadow rounded-4">

                <h2 class="mb-4 fw-bold text-center">Add New Task</h2>

                <form method="POST">

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Task Title</label>
                            <input type="text"
                                   name="title"
                                   class="form-control form-control-lg"
                                   placeholder="Enter task title"
                                   required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Deadline</label>
                            <input type="date"
                                   name="deadline"
                                   class="form-control form-control-lg"
                                   required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Description</label>
                        <textarea name="description"
                                  class="form-control"
                                  rows="4"
                                  placeholder="Write task details..."></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Priority</label>
                        <select name="priority"
                                class="form-select form-select-lg">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('task.dashboard') }}"
                           class="btn btn-outline-secondary btn-lg">
                            Back
                        </a>

                        <button type="submit"
                                class="btn btn-primary btn-lg px-5">
                            Add Task
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </div>

</div>

{% endblock %}
